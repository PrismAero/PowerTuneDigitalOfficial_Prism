name: Release App Bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release_app_bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Release tag ${GITHUB_REF_NAME} does not point to a commit on main."
            echo "Use the promote-release workflow from dev to sync dev->main before tagging."
            exit 1
          fi

      - name: Resolve release variables
        id: vars
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            echo "Workflow only supports tag pushes."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "platform=linux-armv7" >> "$GITHUB_OUTPUT"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.3"
          host: "linux"
          target: "desktop"

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Prepare output directory
        shell: bash
        run: mkdir -p release-assets

      - name: Package GitHub-built artifact
        shell: bash
        run: |
          chmod +x Scripts/package-app-bundle.sh
          Scripts/package-app-bundle.sh "${{ steps.vars.outputs.version }}" "build/PowerTuneQMLGui" "release-assets" "${{ steps.vars.outputs.platform }}"

      - name: Create/Update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.version }}
          files: |
            release-assets/*.tar.gz
            release-assets/*.sha256
            release-assets/release-manifest.json
